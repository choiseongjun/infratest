spring:
  application:
    name: devops-api

  # PostgreSQL Datasource configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/devopsdb
    username: ${DB_USER:postgresuser}
    password: ${DB_PASSWORD:postgres-super-secret-pw}
    driver-class-name: org.postgresql.Driver
  
  # JPA / Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    consumer:
      group-id: devops-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Custom configuration variables
app:
  message: "${APP_MESSAGE:Hello from local dev environment!}"
  env: "${APP_ENV:local}"
  opensearch:
    url: "http://${OPENSEARCH_HOST:localhost}:9200"

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
